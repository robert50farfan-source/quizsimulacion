<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Historial de Quizzes · FIRNT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,900&family=Space+Mono:wght@400;700&family=Archivo:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
:root{--ink:#0d0b14;--paper:#f2f0eb;--paper2:#e5e0d5;--teal:#0fb5a0;--coral:#ff5d3b;--violet:#5b2be8;--gold:#ffb02e;--lime:#d6ff3f;--shadow:5px 5px 0 var(--ink)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--paper);color:var(--ink);font-family:'Archivo',sans-serif;background-image:radial-gradient(var(--paper2) 1.4px,transparent 1.4px);background-size:22px 22px;min-height:100vh}
h1{font-family:'Fraunces',serif;font-weight:900;line-height:.92;font-size:clamp(28px,4vw,52px);letter-spacing:-.02em}
.eyebrow{font-family:'Space Mono',monospace;font-weight:700;letter-spacing:.18em;text-transform:uppercase;font-size:11px;display:inline-flex;align-items:center;gap:10px;color:var(--violet);margin-bottom:12px}
.eyebrow::before{content:"";width:24px;height:3px;background:var(--teal)}
.page-wrap{max-width:960px;margin:0 auto;padding:clamp(20px,4vw,56px)}
.mono{font-family:'Space Mono',monospace}
.btn-sm{font-family:'Space Mono',monospace;font-weight:700;font-size:11px;border:2px solid var(--ink);padding:5px 13px;border-radius:99px;cursor:pointer;background:var(--paper);box-shadow:2px 2px 0 var(--ink);transition:.1s;text-decoration:none;display:inline-flex;align-items:center;gap:5px;color:var(--ink)}
.btn-sm:hover{background:var(--lime)}
.btn-sm.teal{background:var(--teal);border-color:var(--teal)}
.btn-sm.teal:hover{background:var(--lime);border-color:var(--ink)}
.btn-sm.danger{border-color:var(--coral);color:var(--coral)}
.btn-sm.danger:hover{background:var(--coral);color:#fff;border-color:var(--coral)}
.btn-main{display:inline-flex;align-items:center;gap:8px;font-family:'Space Mono',monospace;font-weight:700;font-size:12px;background:var(--ink);color:var(--lime);border:3px solid var(--ink);padding:10px 20px;border-radius:99px;cursor:pointer;box-shadow:var(--shadow);transition:.15s;text-decoration:none}
.btn-main:hover{background:var(--violet)}

/* SEARCH BAR */
.search-wrap{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap;align-items:center}
.search-inp{font-family:'Space Mono',monospace;font-size:13px;border:3px solid var(--ink);background:var(--paper);padding:10px 16px;border-radius:4px;box-shadow:3px 3px 0 var(--ink);outline:none;flex:1;min-width:200px;transition:.15s}
.search-inp:focus{border-color:var(--teal);box-shadow:3px 3px 0 var(--teal)}
.count-badge{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;background:var(--paper2);border:2px solid var(--ink);padding:4px 12px;border-radius:99px;white-space:nowrap}

/* QUIZ CARDS */
.quiz-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(400px,1fr));gap:18px}
@media(max-width:520px){.quiz-grid{grid-template-columns:1fr}}
.quiz-card{border:3px solid var(--ink);border-radius:4px;background:var(--paper);box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column;transition:box-shadow .12s}
.quiz-card:hover{box-shadow:8px 8px 0 var(--ink)}
.qc-header{padding:16px 18px 12px;border-bottom:2px solid var(--paper2)}
.qc-id{font-family:'Space Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.14em;color:var(--violet);margin-bottom:5px}
.qc-title{font-family:'Fraunces',serif;font-weight:900;font-size:20px;line-height:1.1;margin-bottom:3px}
.qc-sub{font-family:'Space Mono',monospace;font-size:11px;color:#777}
.qc-body{padding:14px 18px;display:grid;grid-template-columns:repeat(3,1fr);gap:10px;flex:1}
.stat{display:flex;flex-direction:column;gap:2px}
.stat-val{font-family:'Fraunces',serif;font-weight:900;font-size:26px;line-height:1}
.stat-lbl{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#888}
.qc-temas{padding:0 18px 12px;display:flex;flex-wrap:wrap;gap:5px}
.tema-tag{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;border:2px solid var(--paper2);border-radius:99px;padding:2px 9px;color:#666;white-space:nowrap;max-width:150px;overflow:hidden;text-overflow:ellipsis}
.qc-footer{padding:12px 18px;border-top:2px solid var(--paper2);display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.qc-date{font-family:'Space Mono',monospace;font-size:10px;color:#aaa;margin-left:auto;white-space:nowrap}

/* STATES */
.loading-wrap{text-align:center;padding:60px 20px}
.spinner{display:inline-block;width:32px;height:32px;border:4px solid var(--paper2);border-top-color:var(--teal);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:14px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:60px 20px;border:3px dashed var(--paper2);border-radius:4px}
.empty-state h2{font-family:'Fraunces',serif;font-weight:900;font-size:28px;margin-bottom:10px;color:#bbb}
.alert{font-family:'Space Mono',monospace;font-size:12px;font-weight:700;padding:11px 15px;border-radius:4px;border:3px solid var(--ink);margin-bottom:16px;line-height:1.6}
.alert.err{background:#ffd5cc;color:var(--coral);border-color:var(--coral)}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:var(--paper);border:3px solid var(--ink);box-shadow:8px 8px 0 var(--ink);border-radius:4px;padding:28px;max-width:480px;width:100%}
.modal-title{font-family:'Fraunces',serif;font-weight:900;font-size:22px;margin-bottom:6px}
.modal-sub{font-family:'Space Mono',monospace;font-size:12px;color:#666;margin-bottom:18px;line-height:1.7}
.modal-field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.modal-label{font-family:'Space Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase}
.modal-inp{font-family:'Space Mono',monospace;font-size:14px;border:3px solid var(--ink);background:var(--paper);padding:10px 14px;border-radius:4px;box-shadow:3px 3px 0 var(--ink);outline:none;transition:.15s}
.modal-inp:focus{border-color:var(--teal);box-shadow:3px 3px 0 var(--teal)}
.modal-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
.url-row{display:flex;align-items:center;gap:8px;background:var(--paper2);border:2px solid var(--paper2);border-radius:4px;padding:8px 12px;margin-bottom:8px;flex-wrap:wrap}
.url-text{font-family:'Space Mono',monospace;font-size:11px;word-break:break-all;flex:1;color:var(--ink)}
.copy-btn{font-family:'Space Mono',monospace;font-size:10px;font-weight:700;background:var(--teal);color:var(--ink);border:2px solid var(--ink);padding:3px 10px;border-radius:99px;cursor:pointer;flex-shrink:0;white-space:nowrap}
.copy-btn:hover{background:var(--lime)}
.hidden{display:none!important}
</style>
</head>
<body>
<div class="page-wrap">

  <!-- HEADER -->
  <div style="margin-bottom:28px;padding-bottom:22px;border-bottom:3px solid var(--ink);display:flex;flex-wrap:wrap;gap:14px;align-items:flex-end;justify-content:space-between">
    <div>
      <div class="eyebrow">FIRNT · Panel Docente · Historial</div>
      <h1>Quizzes<br><span style="color:var(--teal)">Creados</span></h1>
    </div>
    <a class="btn-main" href="creator.html">+ Crear nuevo quiz</a>
  </div>

  <div id="alert-wrap"></div>

  <!-- SEARCH -->
  <div class="search-wrap">
    <input class="search-inp" id="search-inp" type="text" placeholder="Buscar por materia, sigla, mesa, ID…" oninput="filterCards()">
    <span class="count-badge" id="count-badge">—</span>
  </div>

  <!-- CONTENT -->
  <div id="loading-wrap" class="loading-wrap">
    <div class="spinner"></div>
    <p style="font-family:'Space Mono',monospace;font-size:12px;color:#888">Cargando quizzes…</p>
  </div>
  <div id="quiz-grid" class="quiz-grid hidden"></div>
  <div id="empty-state" class="empty-state hidden">
    <h2>Sin quizzes aún</h2>
    <p style="font-family:'Space Mono',monospace;font-size:12px;color:#aaa;margin-top:6px">Crea tu primer quiz con el Creador IA.</p>
    <div style="margin-top:18px"><a class="btn-main" href="creator.html">+ Crear quiz</a></div>
  </div>

</div>

<!-- MODAL LINKS -->
<div class="modal-bg hidden" id="modal-links">
  <div class="modal-box">
    <div class="modal-title" id="ml-title">Links del quiz</div>
    <div class="modal-sub" id="ml-sub"></div>
    <div id="ml-body"></div>
    <div class="modal-actions">
      <button class="btn-sm" onclick="closeModal('modal-links')">Cerrar</button>
    </div>
  </div>
</div>

<!-- MODAL DELETE -->
<div class="modal-bg hidden" id="modal-delete">
  <div class="modal-box">
    <div class="modal-title" style="color:var(--coral)">Eliminar quiz</div>
    <div class="modal-sub" id="del-sub">¿Estás seguro? Esta acción eliminará el quiz y no se puede deshacer.</div>
    <div class="modal-field">
      <label class="modal-label" for="del-pass">Contraseña del panel docente</label>
      <input class="modal-inp" id="del-pass" type="password" placeholder="docente2026">
    </div>
    <div id="del-err" style="font-family:'Space Mono',monospace;font-size:11px;color:var(--coral);font-weight:700;min-height:16px"></div>
    <div class="modal-actions">
      <button class="btn-sm danger" id="btn-del-confirm" onclick="confirmDelete()">Eliminar definitivamente</button>
      <button class="btn-sm" onclick="closeModal('modal-delete')">Cancelar</button>
    </div>
  </div>
</div>

<script>
const FIREBASE_CONFIG={apiKey:"AIzaSyBGVUbqNeNBth3d2QEOqsvA1dEW2ovKeg0",authDomain:"quiz-unidad5-c86d8.firebaseapp.com",projectId:"quiz-unidad5-c86d8",storageBucket:"quiz-unidad5-c86d8.firebasestorage.app",messagingSenderId:"226974496351",appId:"1:226974496351:web:a93c597cf3d398a1d24dea"};
const BASE_URL="https://robert50farfan-source.github.io/quizsimulacion";

let db=null;
let allQuizzes=[];
let pendingDeleteId=null;
let pendingDeletePass=null;

try{firebase.initializeApp(FIREBASE_CONFIG);db=firebase.firestore();}catch(e){}

window.addEventListener("DOMContentLoaded",loadQuizzes);

async function loadQuizzes(){
  if(!db){showAlert("Firebase no disponible.","err");hide("loading-wrap");return;}
  try{
    const snap=await db.collection("quizzes").orderBy("created_at","desc").get();
    allQuizzes=[];
    snap.forEach(doc=>{allQuizzes.push({id:doc.id,...doc.data()});});
    hide("loading-wrap");
    renderCards(allQuizzes);
  }catch(e){
    hide("loading-wrap");
    // orderBy requiere índice — intentar sin orden
    try{
      const snap2=await db.collection("quizzes").get();
      allQuizzes=[];
      snap2.forEach(doc=>{allQuizzes.push({id:doc.id,...doc.data()});});
      allQuizzes.sort((a,b)=>{
        const ta=a.created_at?.seconds||0;const tb=b.created_at?.seconds||0;return tb-ta;
      });
      hide("loading-wrap");
      renderCards(allQuizzes);
    }catch(e2){
      showAlert("Error al cargar quizzes: "+e2.message,"err");
    }
  }
}

function renderCards(list){
  document.getElementById("count-badge").textContent=list.length+" quiz"+(list.length!==1?"zes":"");
  const grid=document.getElementById("quiz-grid");
  if(list.length===0){show("empty-state");hide("quiz-grid");return;}
  hide("empty-state");show("quiz-grid");
  grid.innerHTML=list.map(q=>quizCardHTML(q)).join("");
}

function quizCardHTML(q){
  const total=q.total||q.questions?.length||0;
  const temas=q.temas||[];
  const submissionsNote=""; // no cargamos submissions aquí para velocidad
  const dateStr=q.created_at?.seconds
    ?new Date(q.created_at.seconds*1000).toLocaleDateString("es-EC",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"})
    :"—";
  const temasHTML=temas.map(t=>`<span class="tema-tag" title="${esc(t.nombre)}">${esc(t.nombre)}</span>`).join("");
  return`
  <div class="quiz-card" id="card-${q.id}">
    <div class="qc-header">
      <div class="qc-id">${esc(q.id)}</div>
      <div class="qc-title">${esc(q.titulo||q.materia||"Sin título")}</div>
      <div class="qc-sub">${esc(q.materia||"")}${q.sigla?" · "+esc(q.sigla):""}${q.docente?" · "+esc(q.docente):""}</div>
    </div>
    <div class="qc-body">
      <div class="stat"><span class="stat-val">${total}</span><span class="stat-lbl">preguntas</span></div>
      <div class="stat"><span class="stat-val">${temas.length||"—"}</span><span class="stat-lbl">temas</span></div>
      <div class="stat"><span class="stat-val">${q.pass_pct||60}%</span><span class="stat-lbl">aprobación</span></div>
    </div>
    ${temasHTML?`<div class="qc-temas">${temasHTML}</div>`:""}
    <div class="qc-footer">
      <button class="btn-sm teal" onclick="openLinks('${esc(q.id)}','${esc(q.titulo||q.id)}')">🔗 Links</button>
      <a class="btn-sm" href="${BASE_URL}/panel.html?id=${esc(q.id)}" target="_blank">📊 Panel</a>
      <a class="btn-sm" href="${BASE_URL}/quiz.html?id=${esc(q.id)}" target="_blank">▶ Quiz</a>
      <button class="btn-sm danger" onclick="openDelete('${esc(q.id)}','${esc(q.quiz_password||"")}')">✕</button>
      <span class="qc-date">${dateStr}</span>
    </div>
  </div>`;
}

// ── FILTER ───────────────────────────────────────────────────────────
function filterCards(){
  const q=document.getElementById("search-inp").value.toLowerCase().trim();
  const filtered=!q?allQuizzes:allQuizzes.filter(qz=>{
    return [qz.id,qz.titulo,qz.materia,qz.sigla,qz.mesa,qz.docente].some(f=>f&&String(f).toLowerCase().includes(q));
  });
  renderCards(filtered);
}

// ── MODAL LINKS ──────────────────────────────────────────────────────
function openLinks(id,title){
  const quizUrl=`${BASE_URL}/quiz.html?id=${id}`;
  const panelUrl=`${BASE_URL}/panel.html?id=${id}`;
  document.getElementById("ml-title").textContent=title;
  document.getElementById("ml-sub").textContent=`ID: ${id}`;
  document.getElementById("ml-body").innerHTML=`
    <div style="margin-bottom:6px;font-family:'Space Mono',monospace;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:#888">Quiz (estudiantes)</div>
    <div class="url-row">
      <span class="url-text">${quizUrl}</span>
      <button class="copy-btn" onclick="cp('${quizUrl}',this)">Copiar</button>
    </div>
    <div style="margin-top:10px;margin-bottom:6px;font-family:'Space Mono',monospace;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:#888">Panel docente</div>
    <div class="url-row">
      <span class="url-text">${panelUrl}</span>
      <button class="copy-btn" onclick="cp('${panelUrl}',this)">Copiar</button>
    </div>`;
  show("modal-links");
}

// ── MODAL DELETE ─────────────────────────────────────────────────────
function openDelete(id,pass){
  pendingDeleteId=id;pendingDeletePass=pass;
  document.getElementById("del-sub").textContent=`Eliminar quiz "${id}". Esta acción no se puede deshacer.`;
  document.getElementById("del-pass").value="";
  document.getElementById("del-err").textContent="";
  show("modal-delete");
}

async function confirmDelete(){
  const entered=document.getElementById("del-pass").value.trim();
  if(!entered){document.getElementById("del-err").textContent="Ingresa la contraseña.";return;}
  if(entered!==pendingDeletePass){document.getElementById("del-err").textContent="Contraseña incorrecta.";return;}
  const btn=document.getElementById("btn-del-confirm");
  btn.disabled=true;btn.textContent="Eliminando…";
  try{
    await db.collection("quizzes").doc(pendingDeleteId).delete();
    allQuizzes=allQuizzes.filter(q=>q.id!==pendingDeleteId);
    closeModal("modal-delete");
    filterCards();
  }catch(e){
    document.getElementById("del-err").textContent="Error: "+e.message;
  }
  btn.disabled=false;btn.textContent="Eliminar definitivamente";
}

// ── UTILS ────────────────────────────────────────────────────────────
function show(id){document.getElementById(id).classList.remove("hidden")}
function hide(id){document.getElementById(id).classList.add("hidden")}
function closeModal(id){hide(id)}
function showAlert(msg,type){document.getElementById("alert-wrap").innerHTML=`<div class="alert ${type}">${msg}</div>`}
function cp(txt,btn){navigator.clipboard.writeText(txt).then(()=>{const orig=btn.textContent;btn.textContent="✔";setTimeout(()=>btn.textContent=orig,1800);});}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

// Cerrar modales con Escape
document.addEventListener("keydown",e=>{if(e.key==="Escape"){hide("modal-links");hide("modal-delete");}});
// Cerrar con click en fondo
document.getElementById("modal-links").addEventListener("click",e=>{if(e.target===e.currentTarget)hide("modal-links");});
document.getElementById("modal-delete").addEventListener("click",e=>{if(e.target===e.currentTarget)hide("modal-delete");});
</script>
</body>
</html>
